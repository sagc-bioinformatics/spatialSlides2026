# The Bioconductor ecosystem


- A bioinformatics-focused package repository with relatively strict requirements, and an active community. 
- Many great R packages for single cell and spatial transcriptomics within the Bioconductor ecosystem. 
- Packages built upon common data structures mean Bioconductor packages are often interoperable.

---

# What is a SpatialExperiment?

Let's take advantage of the generally good documentation of the Bioconductor ecosystem and look at the vingette for SpatialExperiment to explain:


``` r
browseVignettes("SpatialExperiment")
```

---

# Loading the example data


``` r
library(SpatialExperiment)
# This may require BiocManager::install("VisiumIO")
example(SpatialExperiment, echo = FALSE)
spe

---

# Useful attributes

- store multiple transformations of assay data
- can put your image data in here (imgData)
- store spatial x/y coordinates
- store cell and gene metadata (rowData and colData)
- store embeddings and dimensionality reductions (reducedDims)
- probe or sequencing based spatial can both be analysed (as long as you collapse to cells or bins)
- other extentions (e.g. `SpatialFeatureExperiment`) can even integrate geometry


---


# SpatialExperiment's relationships

Most spatial packages in Bioconductor are built around `SpatialExperiment`.
`SpatialExperiment` actually extends from another Bioconductor package, `SingleCellExperiment`, which in turn extends `SummarizedExperiment`.


``` r
library(CosMxSpatialAnalysisWorkshop)
data(spe)
is(spe, "SpatialExperiment")
```

```
## [1] TRUE
```

``` r
is(spe, "SingleCellExperiment")
```

```
## [1] TRUE
```

Many popular single cell packages (e.g. `scater`, `scran`) were written with `SingleCellExperiment` in mind.
But they can also accept classes that extend `SingleCellExperiment`, meaning we can use `SpatialExperiment` objects with these packages!

---


# Updating

Perhaps we want to log our counts:


``` r
assays(spe)
```

```
## List of length 1
## names(1): counts
```

First we'll have to ensure there are no zeros.
We can subset the SPE to filter zeros out:


``` r
# subsetting returns a new object, we can overwrite the old one
spe &lt;- spe[, colSums(counts(spe)) &gt; 0]
```

We can then add a new assay update the object as our analysis progresses:


``` r
library(scuttle)
spe &lt;- logNormCounts(spe)
assays(spe)
```

```
## List of length 2
## names(2): counts logcounts
```


---

# More on subsetting

Rows are genes, columns are cells.
Subsetting the SPE also subsets all slots and metadata in sync!


``` r
# First 10 genes, all cells
spe[1:10, ]
# subset cells based on coldata column
spe[, spe$in_issue]

# subset by spatial coordinates
spe[, spatialCoords(spe)[, 1] &gt; 2000]
```

---

# Plotting in Space

`plotSpatial` from `SpaNorm` returns a `ggplot` object:


``` r
library(SpaNorm)

plotSpatial(spe, what = "expression", assay = "logcounts", colour = ENSMUSG00000051951)
```

---

# How do I build a SpatialExperiment?

**Importers exist for most platforms:**

``` r
library(SpatialExperimentIO)
# from SpatialExperimentIO
spe &lt;- readXeniumSXE("path/to/xenium/output/")
spe &lt;- readCosMxSXE("path/to/cosmx/output/")
# built into SpatialExperiment
spe &lt;- read10xVisium("path/to/spaceranger/output/")
```

Packages to import specific technologies can lag behind vendor updates,
but it's easy to construct one manually:


``` r
library(Matrix)

spe &lt;- SpatialExperiment(
  assays        = list(counts = counts_matrix),  # genes x cells
  rowData       = gene_metadata,    # data.frame, one row per gene
  colData       = cell_metadata,    # data.frame, one row per cell/spot
  spatialCoords = coords_matrix     # matrix with "x" and "y" columns
)
```
